services:
  # Database Service (Private to internal network)
  db:
    image: postgres:16-alpine
    container_name: cnweb_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-hung2004}
      POSTGRES_DB: ${DB_NAME:-CNWEB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Service (Private to internal network)
  backend:
    build:
      context: ./BE/api
      dockerfile: Dockerfile
    container_name: cnweb_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # Frontend Service (Exposed privately to host loopback on 8082)
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: cnweb_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
