services:
  # Database Service (Private to internal docker network for safety)
  db:
    image: postgres:16-alpine
    container_name: cnweb_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-hung2004}
      POSTGRES_DB: ${DB_NAME:-CNWEB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Service (Private to internal network)
  backend:
    build:
      context: ./BE/api
      dockerfile: Dockerfile
    container_name: cnweb_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  # Frontend Service (Private to internal network)
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: cnweb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_network

  # Production Caddy Reverse Proxy (Exposed to the public internet)
  caddy:
    image: caddy:2-alpine
    container_name: cnweb_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
